<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<header class="site-header" th:fragment="header(activePage)">
  <div class="container">
    <nav class="navbar">

      <!-- Brand -->
      <a href="/" class="navbar-brand">
        <div class="brand-icon">📡</div>
        Vu<span class="accent">Hoang</span>Telecom
      </a>

      <!-- Nav links -->
      <ul class="navbar-nav" id="navMenu">
        <li><a href="/"         th:classappend="${activePage == 'home'}     ? 'active'">Trang chủ</a></li>
        <li><a href="/services" th:classappend="${activePage == 'services'} ? 'active'">Dịch vụ</a></li>
        <li><a href="/about"    th:classappend="${activePage == 'about'}    ? 'active'">Giới thiệu</a></li>
        <li><a href="/contact"  th:classappend="${activePage == 'contact'}  ? 'active'">Liên hệ</a></li>
        <li><a href="/login"    class="btn-header"
               th:classappend="${activePage == 'login'} ? 'active'">Đăng nhập</a></li>
      </ul>

      <!-- Mobile toggle -->
      <button class="navbar-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </div>
</header>

</body>
</html>
