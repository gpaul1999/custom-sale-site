<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Khuyến mãi')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar"><h1>🎁 Khuyến mãi</h1><span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span></div>
  <div class="admin-content">
    <div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>
    <div class="page-header">
      <h2>Danh sách khuyến mãi</h2>
      <a th:href="@{/admin/promotions/new}" class="btn-admin-primary">+ Thêm mới</a>
    </div>
    <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>ID</th><th>Tiêu đề</th><th>Sản phẩm</th><th>Thời gian</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td th:text="${item.id}"></td>
          <td th:text="${item.title}"></td>
          <td th:text="${item.productDetail?.product?.syntax}"></td>
          <td style="font-size:.82rem;color:#546e7a;">
            <span th:text="${#temporals.format(item.startDate,'dd/MM/yyyy')}"></span>
            –
            <span th:text="${#temporals.format(item.endDate,'dd/MM/yyyy')}"></span>
          </td>
          <td>
            <span th:if="${item.enabled}" class="badge-on">Bật</span>
            <span th:unless="${item.enabled}" class="badge-off">Tắt</span>
          </td>
          <td style="display:flex;gap:8px;">
            <a th:href="@{/admin/promotions/{id}/edit(id=${item.id})}" class="btn-admin-warn">Sửa</a>
            <form th:action="@{/admin/promotions/{id}/toggle(id=${item.id})}" method="post" style="display:inline">
              <button type="submit" class="btn-admin-danger" th:text="${item.enabled} ? 'Tắt' : 'Bật'"></button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="6" style="text-align:center;color:#90a4ae;padding:32px;">Chưa có dữ liệu.</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>
</div>
</body>
</html>
