<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Khuyến mãi')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <h1 th:text="${editMode} ? '✏️ Sửa khuyến mãi' : '➕ Thêm khuyến mãi'"></h1>
    <span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span>
  </div>
  <div class="admin-content">
    <div class="page-header">
      <h2 th:text="${editMode} ? 'Sửa khuyến mãi' : 'Thêm khuyến mãi'"></h2>
      <a th:href="@{/admin/promotions}" class="btn-admin-secondary">← Quay lại</a>
    </div>
    <div class="admin-card">
      <form th:action="${editMode} ? @{/admin/promotions/{id}/edit(id=${id})} : @{/admin/promotions/new}"
            method="post" th:object="${form}">
        <div class="field">
          <label>Thuộc sản phẩm <span style="color:red">*</span></label>
          <select th:field="*{productDetailId}" required>
            <option value="">-- Chọn sản phẩm --</option>
            <option th:each="pd : ${productDetails}"
                    th:value="${pd.id}"
                    th:text="${pd.product?.syntax} + (${pd.brand != null} ? ' – ' + ${pd.brand.name} : '') + ' (Detail #' + ${pd.id} + ')'"></option>
          </select>
          <span class="field-hint">Ưu đãi sẽ hiển thị trên trang chi tiết sản phẩm tương ứng.</span>
        </div>
        <div class="field">
          <label>Tiêu đề ưu đãi <span style="color:red">*</span></label>
          <input type="text" th:field="*{title}" placeholder="VD: Giảm 20% tháng đầu" required/>
        </div>
        <div class="field">
          <label>Mô tả chi tiết</label>
          <textarea th:field="*{description}" rows="3" placeholder="Áp dụng cho khách hàng mới..."></textarea>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Ngày bắt đầu <span style="color:red">*</span></label>
            <input type="date" th:field="*{startDate}" required/>
          </div>
          <div class="field">
            <label>Ngày kết thúc <span style="color:red">*</span></label>
            <input type="date" th:field="*{endDate}" required/>
          </div>
        </div>
        <div class="field" style="flex-direction:row;align-items:center;gap:8px;">
          <input type="checkbox" th:field="*{enabled}" id="enabledCheck" style="width:16px;height:16px;"/>
          <label for="enabledCheck" style="margin:0;cursor:pointer;">Kích hoạt khuyến mãi</label>
        </div>
        <div style="display:flex;gap:12px;margin-top:16px;">
          <button type="submit" class="btn-admin-primary" th:text="${editMode} ? 'Lưu thay đổi' : 'Tạo mới'"></button>
          <a th:href="@{/admin/promotions}" class="btn-admin-secondary">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
