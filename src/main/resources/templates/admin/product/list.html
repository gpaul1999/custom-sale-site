<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Sản phẩm')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar"><h1>📦 Sản phẩm</h1><span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span></div>
  <div class="admin-content">
    <div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>
    <div class="page-header">
      <h2>Danh sách sản phẩm</h2>
      <a th:href="@{/admin/products/new}" class="btn-admin-primary">+ Thêm mới</a>
    </div>
    <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>ID</th><th>Tên</th><th>Loại</th><th>Giá</th><th>Sale</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td th:text="${item.id}"></td>
          <td th:text="${item.syntax}"></td>
          <td th:text="${item.productType?.syntax}"></td>
          <td th:text="${item.price != null} ? ${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' đ' : 'Liên hệ'"></td>
          <td>
            <span th:if="${item.saleOff}" class="badge-on">-<span th:text="${item.salePercent}"></span>%</span>
            <span th:unless="${item.saleOff}" style="color:#ccc;">—</span>
          </td>
          <td>
            <span th:if="${item.enabled}" class="badge-on">Hiển thị</span>
            <span th:unless="${item.enabled}" class="badge-off">Ẩn</span>
          </td>
          <td style="display:flex;gap:8px;flex-wrap:wrap;">
            <a th:href="@{/admin/products/{id}/edit(id=${item.id})}" class="btn-admin-warn">Sửa</a>
            <form th:action="@{/admin/products/{id}/toggle(id=${item.id})}" method="post" style="display:inline">
              <button type="submit" class="btn-admin-danger" th:text="${item.enabled} ? 'Ẩn' : 'Hiện'"></button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="7" style="text-align:center;color:#90a4ae;padding:32px;">Chưa có dữ liệu.</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>
</div>
</body>
</html>
