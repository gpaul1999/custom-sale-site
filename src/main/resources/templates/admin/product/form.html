<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Sản phẩm')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <h1 th:text="${editMode} ? '✏️ Sửa sản phẩm' : '➕ Thêm sản phẩm'"></h1>
    <span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span>
  </div>
  <div class="admin-content">
    <div class="page-header">
      <h2 th:text="${editMode} ? '✏️ Sửa sản phẩm' : '➕ Thêm sản phẩm'"/>
      <a th:href="@{/admin/products}" class="btn-admin-secondary">← Quay lại</a>
    </div>
    <div class="admin-card" style="max-width:900px;">
      <form th:action="${editMode} ? @{/admin/products/{id}/edit(id=${id})} : @{/admin/products/new}"
            method="post" th:object="${form}">
        <!-- Product fields -->
        <div class="form-row">
          <div class="field">
            <label>Tên sản phẩm (Syntax) <span style="color:red">*</span></label>
            <input type="text" th:field="*{syntax}" placeholder="VD: SIM 4G Viettel 30GB" required/>
          </div>
          <div class="field">
            <label>Loại sản phẩm <span style="color:red">*</span></label>
            <select th:field="*{productTypeId}" required>
              <option value="">-- Chọn loại --</option>
              <option th:each="pt : ${productTypes}"
                      th:value="${pt.id}"
                      th:text="${pt.syntax} + (${pt.enabled} ? '' : ' [Đã tắt]')"></option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Mô tả ngắn</label>
          <textarea th:field="*{description}" rows="2" placeholder="Mô tả ngắn hiển thị dưới tên sản phẩm"></textarea>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Giá (VNĐ) — để trống nếu "Liên hệ"</label>
            <input type="number" th:field="*{price}" step="1000" min="0" placeholder="150000"/>
          </div>
          <div class="field">
            <label>% Giảm giá</label>
            <input type="number" th:field="*{salePercent}" min="0" max="100" placeholder="0"
                   id="salePercentField"/>
            <span class="field-hint">Nhập 0 nếu không giảm giá</span>
          </div>
        </div>
        <div class="form-row" style="align-items:center;">
          <div class="field" style="flex-direction:row;align-items:center;gap:8px;margin-bottom:0;">
            <input type="checkbox" th:field="*{saleOff}" id="saleOffCheck"
                   style="width:16px;height:16px;" onchange="toggleSalePercent(this)"/>
            <label for="saleOffCheck" style="margin:0;cursor:pointer;">Đang giảm giá</label>
          </div>
          <div class="field" style="flex-direction:row;align-items:center;gap:8px;margin-bottom:0;">
            <input type="checkbox" th:field="*{enabled}" id="enabledCheck"
                   style="width:16px;height:16px;"/>
            <label for="enabledCheck" style="margin:0;cursor:pointer;">Hiển thị trên website</label>
          </div>
        </div>
        <div class="field" style="margin-top:12px;">
          <label>Hình ảnh (path tới /static/)</label>
          <div class="dynamic-list" id="imageList">
            <div th:each="img, iter : *{images}" class="dynamic-list-item">
              <input type="text" th:name="'images[' + ${iter.index} + ']'" th:value="${img}"
                     placeholder="/images/product/ten-anh.png"/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
            <div th:if="${form.images == null or #lists.isEmpty(form.images)}"
                 class="dynamic-list-item">
              <input type="text" name="images[0]" placeholder="/images/product/ten-anh.png"/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
          </div>
          <button type="button" class="btn-add-item" onclick="addItem('imageList','images')">+ Thêm ảnh</button>
        </div>
        <!-- ProductDetail fields -->
        <div class="form-row">
          <div class="field">
            <label>Thương hiệu</label>
            <select th:field="*{brandId}">
              <option value="">-- Không có --</option>
              <option th:each="b : ${brands}"
                      th:value="${b.id}"
                      th:text="${b.name} + (${b.enabled} ? '' : ' [Đã tắt]')"></option>
            </select>
          </div>
          <div class="field" style="flex-direction:row;align-items:center;gap:8px;margin-bottom:0;">
            <input type="checkbox" th:field="*{inStock}" id="inStockCheck" style="width:16px;height:16px;"/>
            <label for="inStockCheck" style="margin:0;cursor:pointer;">Còn hàng</label>
            <input type="checkbox" th:field="*{vat}" id="vatCheck" style="width:16px;height:16px;margin-left:24px;"/>
            <label for="vatCheck" style="margin:0;cursor:pointer;">Có VAT (thuế GTGT)</label>
          </div>
        </div>
        <div class="field">
          <label>Mô tả tóm tắt</label>
          <textarea th:field="*{summaryDescription}" rows="2"
                    placeholder="VD: Gói SIM phổ biến nhất, phù hợp mọi đối tượng."></textarea>
        </div>
        <div class="field">
          <label>Mô tả ngắn (checklist ✓) — mỗi mục 1 dòng</label>
          <div class="dynamic-list" id="shortDescList">
            <div th:each="item, iter : *{shortDescription}" class="dynamic-list-item">
              <input type="text" th:name="'shortDescription[' + ${iter.index} + ']'" th:value="${item}"
                     placeholder="VD: 30GB data tốc độ cao"/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
            <div th:if="${form.shortDescription == null or #lists.isEmpty(form.shortDescription)}"
                 class="dynamic-list-item">
              <input type="text" name="shortDescription[0]" placeholder="VD: 30GB data tốc độ cao"/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
          </div>
          <button type="button" class="btn-add-item" onclick="addItem('shortDescList','shortDescription')">+ Thêm mục</button>
        </div>
        <div class="field">
          <label>Mô tả chi tiết — mỗi đoạn 1 dòng (hiển thị dạng paragraph)</label>
          <div class="dynamic-list" id="detailDescList">
            <div th:each="item, iter : *{detailDescription}" class="dynamic-list-item">
              <input type="text" th:name="'detailDescription[' + ${iter.index} + ']'" th:value="${item}"
                     placeholder="Đoạn mô tả dài..."/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
            <div th:if="${form.detailDescription == null or #lists.isEmpty(form.detailDescription)}"
                 class="dynamic-list-item">
              <input type="text" name="detailDescription[0]" placeholder="Đoạn mô tả dài..."/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
          </div>
          <button type="button" class="btn-add-item" onclick="addItem('detailDescList','detailDescription')">+ Thêm đoạn</button>
        </div>
        <div class="field">
          <label>Thông số kỹ thuật — format: <code style="background:#f0f0f0;padding:1px 6px;border-radius:3px;">Tên: Mô tả</code></label>
          <div class="dynamic-list" id="techList">
            <div th:each="item, iter : *{technicalFunctions}" class="dynamic-list-item">
              <input type="text" th:name="'technicalFunctions[' + ${iter.index} + ']'" th:value="${item}"
                     placeholder="VD: Công nghệ: 4G LTE Cat.6 – Tốc độ tối đa 150Mbps"/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
            <div th:if="${form.technicalFunctions == null or #lists.isEmpty(form.technicalFunctions)}"
                 class="dynamic-list-item">
              <input type="text" name="technicalFunctions[0]"
                     placeholder="VD: Công nghệ: 4G LTE Cat.6 – Tốc độ tối đa 150Mbps"/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
          </div>
          <button type="button" class="btn-add-item" onclick="addItem('techList','technicalFunctions')">+ Thêm thông số</button>
        </div>
        <div class="field">
          <label>Ghi chú / Hướng dẫn đăng ký</label>
          <textarea th:field="*{finalDescription}" rows="2"
                    placeholder="VD: Liên hệ hotline [[${appPhone}]] hoặc đăng ký qua app [[${brandName}]]."></textarea>
        </div>
        <div style="display:flex;gap:12px;margin-top:20px;">
          <button type="submit" class="btn-admin-primary" th:text="${editMode} ? 'Lưu thay đổi' : 'Tạo mới'"/>
          <a th:href="@{/admin/products}" class="btn-admin-secondary">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script th:inline="none">
  function toggleSalePercent(cb) {
    document.getElementById('salePercentField').disabled = !cb.checked;
  }
  document.addEventListener('DOMContentLoaded', function() {
    var cb = document.getElementById('saleOffCheck');
    if (cb) toggleSalePercent(cb);
  });
  function addItem(listId, fieldName) {
    var list = document.getElementById(listId);
    var count = list.querySelectorAll('.dynamic-list-item').length;
    var div = document.createElement('div');
    div.className = 'dynamic-list-item';
    div.innerHTML = '<input type="text" name="' + fieldName + '[' + count + ']" placeholder="Nhập nội dung..."/>'
                  + '<button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>';
    list.appendChild(div);
  }
  function removeItem(btn) {
    var item = btn.closest('.dynamic-list-item');
    var list = item.parentElement;
    if (list.querySelectorAll('.dynamic-list-item').length > 1) {
      item.remove();
      list.querySelectorAll('.dynamic-list-item input').forEach(function(input, i) {
        input.name = input.name.replace(/\[\d+\]/, '[' + i + ']');
      });
    }
  }
</script>
</body>
</html>
