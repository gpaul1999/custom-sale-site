<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Thương hiệu')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <h1 th:text="${editMode} ? '✏️ Sửa thương hiệu' : '➕ Thêm thương hiệu'"></h1>
    <span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span>
  </div>
  <div class="admin-content">
    <div class="page-header">
      <h2 th:text="${editMode} ? 'Sửa thương hiệu' : 'Thêm thương hiệu'"></h2>
      <a th:href="@{/admin/brands}" class="btn-admin-secondary">← Quay lại</a>
    </div>
    <div class="admin-card">
      <form th:action="${editMode} ? @{/admin/brands/{id}/edit(id=${id})} : @{/admin/brands/new}"
            method="post" th:object="${form}">
        <div class="form-row">
          <div class="field">
            <label>Tên thương hiệu <span style="color:red">*</span></label>
            <input type="text" th:field="*{name}" required/>
          </div>
          <div class="field">
            <label>Logo (path tới /static/)</label>
            <input type="text" th:field="*{logo}" placeholder="/images/brand/viettel.png"/>
            <span class="field-hint">VD: /images/brand/viettel.png</span>
          </div>
        </div>
        <div class="field">
          <label>Mô tả dài — mỗi dòng 1 mục</label>
          <div class="dynamic-list" id="longDescList">
            <div th:each="desc, iter : *{longDescription}" class="dynamic-list-item">
              <input type="text" th:name="'longDescription[' + ${iter.index} + ']'" th:value="${desc}"
                     placeholder="Mô tả về thương hiệu..."/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
            <div th:if="${form.longDescription == null or #lists.isEmpty(form.longDescription)}" class="dynamic-list-item">
              <input type="text" name="longDescription[0]" placeholder="Mô tả về thương hiệu..."/>
              <button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>
            </div>
          </div>
          <button type="button" class="btn-add-item" onclick="addItem('longDescList','longDescription')">+ Thêm mục</button>
        </div>
        <div class="field" style="flex-direction:row;align-items:center;gap:8px;">
          <input type="checkbox" th:field="*{enabled}" id="enabledCheck" style="width:16px;height:16px;"/>
          <label for="enabledCheck" style="margin:0;cursor:pointer;">Hoạt động</label>
        </div>
        <div style="display:flex;gap:12px;margin-top:16px;">
          <button type="submit" class="btn-admin-primary" th:text="${editMode} ? 'Lưu thay đổi' : 'Tạo mới'"></button>
          <a th:href="@{/admin/brands}" class="btn-admin-secondary">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script th:inline="none">
  function addItem(listId, fieldName) {
    var list = document.getElementById(listId);
    var count = list.querySelectorAll('.dynamic-list-item').length;
    var div = document.createElement('div');
    div.className = 'dynamic-list-item';
    div.innerHTML = '<input type="text" name="' + fieldName + '[' + count + ']" placeholder="Nhập nội dung..."/>'
                  + '<button type="button" class="btn-remove-item" onclick="removeItem(this)">✕</button>';
    list.appendChild(div);
  }
  function removeItem(btn) {
    var item = btn.closest('.dynamic-list-item');
    var list = item.parentElement;
    if (list.querySelectorAll('.dynamic-list-item').length > 1) {
      item.remove();
      list.querySelectorAll('.dynamic-list-item input').forEach(function(input, i) {
        input.name = input.name.replace(/\[\d+\]/, '[' + i + ']');
      });
    }
  }
</script>
</body>
</html>
