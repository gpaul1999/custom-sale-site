<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Thương hiệu')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar"><h1>🏢 Thương hiệu</h1><span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span></div>
  <div class="admin-content">
    <div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>
    <div class="page-header">
      <h2>Danh sách thương hiệu</h2>
      <a th:href="@{/admin/brands/new}" class="btn-admin-primary">+ Thêm mới</a>
    </div>
    <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>ID</th><th>Logo</th><th>Tên</th><th>Mô tả</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td th:text="${item.id}"></td>
          <td>
            <img th:if="${item.logo != null}" th:src="${item.logo}" th:alt="${item.name}"
                 style="width:36px;height:36px;object-fit:contain;border-radius:4px;background:#f5f5f5;padding:2px;"
                 onerror="this.style.display='none'"/>
            <span th:unless="${item.logo != null}" style="color:#ccc;">—</span>
          </td>
          <td th:text="${item.name}"></td>
          <td style="color:#90a4ae;font-size:.82rem;"
              th:text="${item.longDescription != null} ? ${#lists.size(item.longDescription)} + ' mục' : '—'"></td>
          <td>
            <span th:if="${item.enabled}" class="badge-on">Hoạt động</span>
            <span th:unless="${item.enabled}" class="badge-off">Đã tắt</span>
          </td>
          <td style="display:flex;gap:8px;">
            <a th:href="@{/admin/brands/{id}/edit(id=${item.id})}" class="btn-admin-warn">Sửa</a>
            <form th:action="@{/admin/brands/{id}/toggle(id=${item.id})}" method="post" style="display:inline">
              <button type="submit" class="btn-admin-danger" th:text="${item.enabled} ? 'Tắt' : 'Bật'"></button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="6" style="text-align:center;color:#90a4ae;padding:32px;">Chưa có dữ liệu.</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>
</div>
</body>
</html>
