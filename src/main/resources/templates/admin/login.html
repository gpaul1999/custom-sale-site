<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Login – [[${brandName}]]</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      background: #fff; border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 40px 36px; width: 360px;
    }
    .login-box h1 { font-size: 1.3rem; color: #1a237e; margin: 0 0 6px; }
    .login-box p  { font-size: .85rem; color: #90a4ae; margin: 0 0 28px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: .82rem; font-weight: 700; color: #546e7a; }
    .field input  { padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: .9rem; outline: none; }
    .field input:focus { border-color: #1a237e; }
    .btn-login {
      width: 100%; padding: 11px;
      background: #1a237e; color: #fff; border: none;
      border-radius: 6px; font-size: .95rem; font-weight: 700; cursor: pointer;
      margin-top: 6px;
    }
    .btn-login:hover { background: #283593; }
    .alert { background: #fce4ec; color: #c62828; padding: 10px 14px; border-radius: 6px; font-size: .85rem; margin-bottom: 16px; }
    .success { background: #e8f5e9; color: #2e7d32; padding: 10px 14px; border-radius: 6px; font-size: .85rem; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>⚙️ Admin Panel</h1>
    <p>[[${brandName}]] – Quản trị hệ thống</p>
    <div th:if="${param.error}"  class="alert">Sai tên đăng nhập hoặc mật khẩu.</div>
    <div th:if="${param.logout}" class="success">Đã đăng xuất thành công.</div>
    <form method="post" th:action="@{/admin/login}">
      <div class="field">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" name="username" placeholder="admin" required/>
      </div>
      <div class="field">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" required/>
      </div>
      <button type="submit" class="btn-login">Đăng nhập</button>
    </form>
  </div>
</body>
</html>
