<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Chi tiết sản phẩm')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar"><h1>📋 Chi tiết sản phẩm</h1><span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span></div>
  <div class="admin-content">
    <div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>
    <div class="page-header">
      <h2>Danh sách chi tiết sản phẩm</h2>
      <a th:href="@{/admin/product-details/new}" class="btn-admin-primary">+ Thêm mới</a>
    </div>
    <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>ID</th><th>Sản phẩm</th><th>Thương hiệu</th><th>Còn hàng</th><th>VAT</th><th>Hành động</th></tr></thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td th:text="${item.id}"></td>
          <td th:text="${item.product?.syntax}"></td>
          <td th:text="${item.brand?.name} ?: '—'"></td>
          <td>
            <span th:if="${item.inStock}" class="badge-on">Còn hàng</span>
            <span th:unless="${item.inStock}" class="badge-off">Hết hàng</span>
          </td>
          <td>
            <span th:if="${item.vat}" class="badge-on">Có VAT</span>
            <span th:unless="${item.vat}" style="color:#ccc;">Không</span>
          </td>
          <td>
            <a th:href="@{/admin/product-details/{id}/edit(id=${item.id})}" class="btn-admin-warn">Sửa</a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="6" style="text-align:center;color:#90a4ae;padding:32px;">Chưa có dữ liệu.</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>
</div>
</body>
</html>
