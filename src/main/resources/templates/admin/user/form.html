<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Người dùng')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar"><h1>✏️ Sửa người dùng</h1><span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span></div>
  <div class="admin-content">
    <div class="page-header">
      <h2>Sửa người dùng</h2>
      <a th:href="@{/admin/users}" class="btn-admin-secondary">← Quay lại</a>
    </div>
    <div class="admin-card">
      <form th:action="@{/admin/users/{id}/edit(id=${id})}" method="post" th:object="${form}">
        <div style="background:#f8f9fa;border-radius:6px;padding:14px 16px;margin-bottom:20px;border:1px solid #e0e0e0;">
          <div style="font-size:.75rem;font-weight:700;color:#90a4ae;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">
            Thông tin tài khoản (không thể thay đổi)
          </div>
          <div class="form-row" style="margin-bottom:0;">
            <div class="field" style="margin-bottom:0;">
              <label>Email</label>
              <input type="email" th:field="*{email}" readonly style="background:#fff;color:#546e7a;cursor:not-allowed;"/>
            </div>
            <div class="field" style="margin-bottom:0;">
              <label>Tenant ID</label>
              <input type="text" th:field="*{tenantId}" readonly style="background:#fff;color:#546e7a;cursor:not-allowed;"/>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Họ</label>
            <input type="text" th:field="*{firstName}" placeholder="Nguyễn"/>
          </div>
          <div class="field">
            <label>Tên</label>
            <input type="text" th:field="*{lastName}" placeholder="Văn A"/>
          </div>
        </div>
        <div class="field" style="flex-direction:row;align-items:center;gap:8px;margin-top:4px;">
          <input type="checkbox" th:field="*{enabled}" id="enabledCheck" style="width:16px;height:16px;"/>
          <label for="enabledCheck" style="margin:0;cursor:pointer;font-weight:600;">Tài khoản hoạt động</label>
        </div>
        <p style="font-size:.8rem;color:#90a4ae;margin:4px 0 20px 24px;">
          Bỏ chọn để khoá tài khoản — người dùng sẽ không thể đăng nhập.
        </p>
        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn-admin-primary">Lưu thay đổi</button>
          <a th:href="@{/admin/users}" class="btn-admin-secondary">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
