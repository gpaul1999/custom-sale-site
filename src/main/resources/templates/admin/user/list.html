<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Người dùng')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar"><h1>👤 Người dùng</h1><span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span></div>
  <div class="admin-content">
    <div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>
    <div class="page-header"><h2>Danh sách người dùng</h2></div>
    <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>ID</th><th>Tên</th><th>Email</th><th>Tenant</th><th>Ngày tạo</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td th:text="${item.id}"></td>
          <td th:text="${(item.firstName ?: '') + ' ' + (item.lastName ?: '')}"></td>
          <td th:text="${item.email}"></td>
          <td th:text="${item.tenantId}"></td>
          <td style="font-size:.82rem;color:#546e7a;" th:text="${#temporals.format(item.createdAt,'dd/MM/yyyy')}"></td>
          <td>
            <span th:if="${item.enabled}" class="badge-on">Hoạt động</span>
            <span th:unless="${item.enabled}" class="badge-off">Bị khoá</span>
          </td>
          <td style="display:flex;gap:8px;">
            <a th:href="@{/admin/users/{id}/edit(id=${item.id})}" class="btn-admin-warn">Sửa</a>
            <form th:action="@{/admin/users/{id}/toggle(id=${item.id})}" method="post" style="display:inline">
              <button type="submit" class="btn-admin-danger" th:text="${item.enabled} ? 'Khoá' : 'Mở khoá'"></button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="7" style="text-align:center;color:#90a4ae;padding:32px;">Chưa có người dùng.</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>
</div>
</body>
</html>
