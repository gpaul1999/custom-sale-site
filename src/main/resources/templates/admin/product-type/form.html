<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/layout :: head('Loại sản phẩm')}"></head>
<body>
<div th:insert="~{admin/fragments/layout :: sidebar}"></div>
<div class="admin-main">
  <div class="admin-topbar">
    <h1 th:text="${editMode} ? '✏️ Sửa loại sản phẩm' : '➕ Thêm loại sản phẩm'"></h1>
    <span style="font-size:.82rem;color:#90a4ae;">[[${brandName}]] Admin</span>
  </div>
  <div class="admin-content">
    <div class="page-header">
      <h2 th:text="${editMode} ? 'Sửa loại sản phẩm' : 'Thêm loại sản phẩm'"></h2>
      <a th:href="@{/admin/product-types}" class="btn-admin-secondary">← Quay lại</a>
    </div>
    <div class="admin-card">
      <form th:action="${editMode} ? @{/admin/product-types/{id}/edit(id=${id})} : @{/admin/product-types/new}"
            method="post" th:object="${form}">
        <div class="field">
          <label>Syntax (tên hiển thị trên tab) <span style="color:red">*</span></label>
          <input type="text" th:field="*{syntax}" placeholder="Di động, Internet, ..." required/>
        </div>
        <div class="field">
          <label>Mô tả</label>
          <textarea th:field="*{description}" placeholder="Mô tả ngắn về loại sản phẩm"></textarea>
        </div>
        <div class="field" style="flex-direction:row;align-items:center;gap:8px;">
          <input type="checkbox" th:field="*{enabled}" id="enabledCheck" style="width:16px;height:16px;"/>
          <label for="enabledCheck" style="margin:0;cursor:pointer;">Hoạt động</label>
        </div>
        <div style="display:flex;gap:12px;margin-top:16px;">
          <button type="submit" class="btn-admin-primary" th:text="${editMode} ? 'Lưu thay đổi' : 'Tạo mới'"></button>
          <a th:href="@{/admin/product-types}" class="btn-admin-secondary">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
