<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Đăng nhập – VuHoangTelecom</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div th:replace="~{fragments/header :: header('login')}"></div>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-text">VuHoang<span>Telecom</span></div>
    </div>

    <h2>Đăng nhập</h2>
    <p class="subtitle">Chào mừng bạn quay trở lại 👋</p>

    <div class="alert alert-danger"  th:if="${error}"   th:text="${error}"></div>
    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>

    <form action="/login" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}"/>
      <div class="form-group">
        <label for="username">Email / Tên đăng nhập</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="email@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label for="password">
          Mật khẩu
          <a href="#" style="float:right;font-weight:400;color:var(--primary);font-size:.82rem">Quên mật khẩu?</a>
        </label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="••••••••" required/>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
        <input type="checkbox" id="remember" name="remember-me" style="width:16px;height:16px"/>
        <label for="remember" style="margin:0;font-weight:400;font-size:.9rem;cursor:pointer">Nhớ tài khoản</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
        Đăng nhập
      </button>
    </form>

    <div class="auth-footer-link">
      Chưa có tài khoản? <a href="/register"><strong>Đăng ký ngay</strong></a>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
